<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f5f7" />
    <title>Monitor · Notion Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect x=%228%22 y=%2236%22 width=%2212%22 height=%2220%22 rx=%223%22 fill=%22%238dbad6%22/%3E%3Crect x=%2226%22 y=%2222%22 width=%2212%22 height=%2234%22 rx=%223%22 fill=%22%23b9f5c4%22/%3E%3Crect x=%2244%22 y=%2210%22 width=%2212%22 height=%2246%22 rx=%223%22 fill=%22%23fd9a9a%22/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js" defer></script>
    <script src="./dashboard.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <svg class="logo" viewBox="0 0 64 64" width="28" height="28" aria-hidden="true" focusable="false">
          <rect x="8" y="36" width="12" height="20" rx="3" fill="#8dbad6"/>
          <rect x="26" y="22" width="12" height="34" rx="3" fill="#b9f5c4"/>
          <rect x="44" y="10" width="12" height="46" rx="3" fill="#fd9a9a"/>
        </svg>
        <h1>Monitor</h1>
        <span id="generated-at" class="muted"></span>
      </div>
      <div class="topbar-actions">
        <a id="sync-trigger" class="btn-ghost small"
           href="https://github.com/EliasCalixto/monitor/actions/workflows/sync-notion.yml"
           target="_blank" rel="noreferrer"
           title="Opens GitHub Actions in a new tab — click 'Run workflow' there, wait ~30s, then click ↻ here to reload.">
          <span class="sync-label-full">Sync from Notion</span>
          <span class="sync-label-short">Sync</span>
          <span aria-hidden="true">↗</span>
        </a>
        <button id="refresh" class="btn-ghost" title="Reload data.json">↻</button>
      </div>
    </header>

    <section class="resumen-block">
      <div class="resumen-head">
        <h2 id="resumen-title">Resumen</h2>
        <span class="muted small">Overview</span>
      </div>
      <div id="resumen-grid" class="kpi-grid"></div>
    </section>

    <section class="filters card">
      <div class="filter-row">
        <div class="filter-group">
          <label for="period">Period</label>
          <select id="period">
            <option value="this-week">This week</option>
            <option value="this-month">This month</option>
            <option value="last-month">Last month</option>
            <option value="3m">Last 3 months</option>
            <option value="6m">Last 6 months</option>
            <option value="year">This year</option>
            <option value="last-year">Last year</option>
            <option value="all" selected>All time</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="filter-group date-group">
          <label for="date-from">From</label>
          <input type="date" id="date-from" />
        </div>
        <div class="filter-group date-group">
          <label for="date-to">To</label>
          <input type="date" id="date-to" />
        </div>
        <div class="filter-spacer"></div>
        <button id="reset-filters" class="btn-ghost small" title="Reset filters">Reset</button>
      </div>
      <div class="filter-row chips-row">
        <div class="filter-group filter-group-full">
          <label>Categories <span class="muted small">— click to focus</span></label>
          <div id="category-chips" class="chip-row"></div>
        </div>
      </div>
    </section>

    <section class="card section-card">
      <header class="section-head">
        <h2>Expenses</h2>
        <span id="exp-count" class="muted"></span>
      </header>
      <div class="charts-grid">
        <div class="chart-box">
          <h3>By category</h3>
          <canvas id="exp-donut"></canvas>
        </div>
        <div class="chart-box">
          <h3>Category totals</h3>
          <canvas id="exp-sum-bars"></canvas>
        </div>
      </div>
      <div class="charts-grid one">
        <div class="chart-box">
          <h3>Monthly evolution</h3>
          <canvas id="exp-evolution"></canvas>
        </div>
      </div>
      <div class="table-wrap">
        <table id="exp-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="card section-card">
      <header class="section-head">
        <h2>Incomes</h2>
        <span id="inc-count" class="muted"></span>
      </header>
      <div class="charts-grid">
        <div class="chart-box">
          <h3>Yearly total <span class="muted small">— all time</span></h3>
          <canvas id="inc-yearly"></canvas>
        </div>
        <div class="chart-box">
          <h3>Monthly <span class="muted small">— filtered</span></h3>
          <canvas id="inc-monthly"></canvas>
        </div>
      </div>
      <div class="table-wrap">
        <table id="inc-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <footer class="muted">
      Data synced from Notion via GitHub Actions ·
      <a id="repo-link" href="https://github.com/EliasCalixto/monitor" target="_blank" rel="noreferrer">Repo</a>
    </footer>

    <div id="status"></div>
  </body>
</html>
